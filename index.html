<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rinki Negi Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* Main container */
.home {
    display: flex;
    height: 100vh;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
}

/* LEFT SIDE */
.left {
    max-width: 500px;
}

.left h1 {
    font-size: 50px;
    margin: 0;
    color: #38bdf8;
}

.left h2 {
    margin: 10px 0;
    font-weight: normal;
}

.left p {
    line-height: 1.6;
    color: #cbd5f5;
}

.buttons {
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    margin-right: 10px;
    border: none;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}

/* RIGHT SIDE */
.right {
    position: relative;
}

/* Girl image */
.right img {
    width: 380px;
    animation: float 3s ease-in-out infinite;
}

/* Floating animation */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* Speech bubble */
.speech {
    position: absolute;
    top: 20px;
    left: -140px;
    background: #38bdf8;
    color: black;
    padding: 12px 18px;
    border-radius: 20px;
    font-weight: bold;
    animation: pop 1.5s ease;
}

/* Speech tail */
.speech::after {
    content: "";
    position: absolute;
    right: -10px;
    top: 20px;
    border-width: 10px;
    border-style: solid;
    border-color: transparent transparent transparent #38bdf8;
}

/* Pop animation */
@keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="home">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Rinki Negi</h1>
        <h2>Cybersecurity Student | Developer</h2>

        <p>
            I am a B.Tech CSE (Cybersecurity) student passionate about 
            ethical hacking, web development, and building secure applications.
        </p>

        <p>
            🔹 Skills: C, C++, Java, DSA <br>
            🔹 Learning: Cybersecurity, Networking <br>
            🔹 Goal: Become a Security Engineer
        </p>

        <div class="buttons">
            <button>View Projects</button>
            <button>Contact Me</button>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="speech">
            Hi, I'm Rinki Negi 👋
        </div>

        <img src="https://cdn.dribbble.com/users/214929/screenshots/4362826/girl-working.gif">

    </div>

</div>

</body>
</html>
